name: Dependency audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 0 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Enforce audit baseline
        run: npm run security:audit:baseline
